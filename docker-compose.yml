services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/workspace/target
    environment:
      CARGO_TARGET_DIR: /workspace/target
      RUST_BACKTRACE: "1"
    profiles: ["dev"]
    command: bash

volumes:
  cargo-cache:
  target-cache:
